name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "wrangler.toml"
      - "schema.sql"
      - "package.json"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4.71.0"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
